[terminal.shell]
program = "pwsh.exe"
args = ["-NoLogo"]

[general]
working_directory = "C:\\Users\\mirad"

[window]
decorations = "full"
opacity = 0.95
padding = { x = 10, y = 10 }

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 12.0

[colors.primary]
background = "#000000"
